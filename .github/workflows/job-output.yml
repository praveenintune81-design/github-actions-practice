name: Job Output Demo

on:
  push:

jobs:

  generate-date:
    runs-on: ubuntu-latest

    outputs:
      today: ${{ steps.date.outputs.today }}

    steps:
      - name: Generate date
        id: date
        run: echo "today=$(date)" >> $GITHUB_OUTPUT


  use-date:
    runs-on: ubuntu-latest
    needs: generate-date

    steps:
      - name: Print date from previous job
        run: echo "Today's date is ${{ needs.generate-date.outputs.today }}"
