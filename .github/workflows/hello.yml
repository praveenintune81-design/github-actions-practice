name: Hello Workflow

on: push

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Hello
        run: echo "Hello from GitHub Actions!"

      - name: Print Current Date
        run: date

      - name: Print Branch Name
        run: |
          echo "Branch: ${{ github.ref_name }}"

      - name: List Files
        run: ls -la

      - name: Show Runner OS
        run: uname -a
